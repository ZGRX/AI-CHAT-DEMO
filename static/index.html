<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI Chat Demo</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="chat">
        <h1>AI Chat Demo</h1>

        <div id="messages" class="messages"></div>

        <form id="chat-form" class="chat-form">
            <select id="task-select" aria-label="选择处理任务">
                <option value="chat">聊天</option>
                <option value="summarize">总结</option>
                <option value="translate">翻译</option>
                <option value="explain_code">代码解释</option>
                <option value="weekly_report">周报</option>
            </select>
            <input id="message-input" type="text" placeholder="请输入内容" autocomplete="off">
            <button type="submit">发送</button>
        </form>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
